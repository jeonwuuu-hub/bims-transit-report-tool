<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>부산 대중교통 현황표 자동생성</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="control-panel">
        <div class="title-block">
          <p class="eyebrow">Busan BIMS</p>
          <h1>대중교통 현황표 자동생성</h1>
        </div>

        <form id="reportForm" class="form-grid">
          <div class="two-cols">
            <label>
              위도
              <input id="lat" name="lat" type="number" step="any" placeholder="35.17103920264202" required>
            </label>
            <label>
              경도
              <input id="lng" name="lng" type="number" step="any" placeholder="129.07691415917" required>
            </label>
          </div>
          <label>
            반경(m)
            <input id="radius" name="radius" type="number" min="50" max="3000" step="50" value="500" required>
          </label>
          <div class="actions">
            <button type="submit" id="runButton">표 생성</button>
            <button type="button" id="copyButton" disabled>표 복사</button>
            <button type="button" id="downloadButton" disabled>엑셀용 HTML 저장</button>
          </div>
        </form>

        <div class="note">
          <p>입력 좌표는 카카오맵 위도/경도 기준입니다.</p>
          <p>정류장 목록의 좌표는 캐드 수치지도용 CAD X/Y(EPSG:5187)로 변환해 표시합니다.</p>
          <p>정류소, 경유노선, 운행현황은 부산BIMS 데이터를 기준으로 생성합니다.</p>
        </div>
      </section>

      <section class="result-panel">
        <div id="status" class="status">좌표와 반경을 입력한 뒤 표 생성을 눌러주세요.</div>
        <div id="summary" class="summary-grid"></div>
        <div id="tables" class="tables"></div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
